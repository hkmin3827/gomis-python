<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Gomis</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #ui {
        position: fixed;
        bottom: 8%;
        width: 100%;
        text-align: center;
        pointer-events: none;
        z-index: 10;
      }
      #status {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
        font-size: 14px;
        letter-spacing: 4px;
        color: rgba(205, 165, 255, 0.92);
        text-shadow: 0 0 22px rgba(170, 100, 255, 0.85);
        transition: opacity 0.35s ease;
      }
      #name {
        margin-top: 10px;
        font-family: "Courier New", monospace;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 7px;
        color: rgba(130, 90, 195, 0.48);
      }
      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(180, 130, 255, 0.7);
        font-family: "Courier New", monospace;
        font-size: 12px;
        letter-spacing: 3px;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="loading">GOMIS LOADING . . .</div>
    <div id="ui" style="display: none">
      <div id="status">대기 중</div>
      <div id="name">GOMIS</div>
    </div>

    <!-- Three.js r134 UMD (importmap 미지원 환경 대응) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/Pass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
      window.addEventListener("load", function () {
        document.getElementById("loading").style.display = "none";
        document.getElementById("ui").style.display = "block";
        initGomis();
      });

      function initGomis() {
        /* ============================================================
           1. 기본 Scene / Camera / Renderer 세팅
           ============================================================ */
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.set(0, 0, 9);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.insertBefore(
          renderer.domElement,
          document.getElementById("ui"),
        );

        /* ============================================================
           2. 파티클용 원형 텍스처 생성 (부드러운 점)
           ============================================================ */
        function makeCircleTexture() {
          const size = 128;
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = size;
          const ctx = canvas.getContext("2d");
          const grad = ctx.createRadialGradient(
            size / 2,
            size / 2,
            0,
            size / 2,
            size / 2,
            size / 2,
          );
          grad.addColorStop(0.0, "rgba(255,255,255,1)");
          grad.addColorStop(0.3, "rgba(255,255,255,0.6)");
          grad.addColorStop(0.7, "rgba(255,255,255,0.1)");
          grad.addColorStop(1.0, "rgba(255,255,255,0)");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, size, size);
          return new THREE.CanvasTexture(canvas);
        }
        const dotTexture = makeCircleTexture();

        /* ============================================================
           3. 색상 팔레트 (보라/라벤더 톤)
           ============================================================ */
        const COLOR_BRIGHT = new THREE.Color(0xe9d5ff); // 밝은 라벤더
        const COLOR_MID = new THREE.Color(0xa78bfa); // 메인 바이올렛
        const COLOR_DEEP = new THREE.Color(0x6d28d9); // 짙은 퍼플

        /* ============================================================
           4. 별 배경 (Starfield)
           ============================================================ */
        function randomStarPosition(out, i) {
          const r = 60 + Math.random() * 40;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          out[i * 3] = r * Math.sin(phi) * Math.cos(theta);
          out[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
          out[i * 3 + 2] = r * Math.cos(phi);
        }

        function randomStarVelocity(out, i) {
          // 무중력 랜덤 방향
          const speed = 0.03 + Math.random() * 0.04;
          const vTheta = Math.random() * Math.PI * 2;
          const vPhi = Math.acos(2 * Math.random() - 1);
          out[i * 3] = speed * Math.sin(vPhi) * Math.cos(vTheta);
          out[i * 3 + 1] = speed * Math.sin(vPhi) * Math.sin(vTheta);
          out[i * 3 + 2] = speed * Math.cos(vPhi);
        }

        function createStarfield() {
          const count = 1000;
          const geo = new THREE.BufferGeometry();
          const positions = new Float32Array(count * 3);
          const velocities = new Float32Array(count * 3);

          for (let i = 0; i < count; i++) {
            randomStarPosition(positions, i);
            randomStarVelocity(velocities, i);
          }
          geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

          const mat = new THREE.PointsMaterial({
            color: 0x9090a8,
            size: 0.73,
            map: dotTexture,
            transparent: true,
            opacity: 0.38,
            depthWrite: false,
            sizeAttenuation: true,
            blending: THREE.AdditiveBlending,
          });
          const points = new THREE.Points(geo, mat);
          points.userData.velocities = velocities;
          return points;
        }

        /* ============================================================
           5. 중심 코어 — 빛나는 입자 구체
           ============================================================ */
        function createCoreSphere(radius, count) {
          const geo = new THREE.BufferGeometry();
          const positions = new Float32Array(count * 3);
          const colors = new Float32Array(count * 3);

          for (let i = 0; i < count; i++) {
            const r = radius + (Math.random() - 0.5) * 0.18;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);

            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);

            const t = Math.random();
            const c = COLOR_MID.clone().lerp(COLOR_BRIGHT, t * 0.7);
            colors[i * 3] = c.r;
            colors[i * 3 + 1] = c.g;
            colors[i * 3 + 2] = c.b;
          }
          geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
          geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

          const mat = new THREE.PointsMaterial({
            size: 0.055,
            map: dotTexture,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
          });
          return new THREE.Points(geo, mat);
        }

        /* ============================================================
           6. 스파이크(원뿔) — 파티클로 표현
           ============================================================ */
        function fibonacciDirections(count) {
          const dirs = [];
          const golden = Math.PI * (3 - Math.sqrt(5));
          for (let i = 0; i < count; i++) {
            const y = 1 - (i / (count - 1)) * 2;
            const r = Math.sqrt(1 - y * y);
            const theta = golden * i;
            dirs.push(
              new THREE.Vector3(Math.cos(theta) * r, y, Math.sin(theta) * r),
            );
          }
          return dirs;
        }

        function createSpike(length, baseRadius, particleCount) {
          const geo = new THREE.BufferGeometry();
          const positions = new Float32Array(particleCount * 3);
          const colors = new Float32Array(particleCount * 3);

          // 끝부분이 반구가 되는 비율 (0.0 ~ 1.0)
          const roundRatio = 0.5; // 위쪽 35%가 둥근 부분
          const bodyLength = length * (1 - roundRatio);
          const tipLength = length * roundRatio;

          for (let i = 0; i < particleCount; i++) {
            const h = 1 - Math.pow(Math.random(), 0.6);
            const angle = Math.random() * Math.PI * 2;
            const surfaceMix = Math.random() < 0.7 ? 1.0 : Math.random();

            let radiusAtH, yPos;

            if (h < 1 - roundRatio) {
              // 아래쪽: 곡선 몸통 (기존과 동일)
              const bodyH = h / (1 - roundRatio); // 0~1로 재정규화
              const baseShape = Math.pow(1 - bodyH, 1.4);
              // 몸통 끝 반지름 = 둥근 부분 시작 반지름
              const neckRadius = baseRadius * Math.pow(roundRatio, 2);
              radiusAtH = neckRadius + (baseRadius - neckRadius) * baseShape;
              yPos = h * length;
            } else {
              // 위쪽: 반구 (원호로 0에 수렴)
              const tipH = (h - (1 - roundRatio)) / roundRatio; // 0~1로 재정규화
              const neckRadius = baseRadius * Math.pow(roundRatio, 0.9);
              // 반구 공식: sqrt(1 - x^2)
              radiusAtH = neckRadius * Math.sqrt(1 - tipH * tipH);
              yPos = bodyLength + tipH * tipLength;
            }

            positions[i * 3] = Math.cos(angle) * radiusAtH * surfaceMix;
            positions[i * 3 + 1] = yPos;
            positions[i * 3 + 2] = Math.sin(angle) * radiusAtH * surfaceMix;

            const c = COLOR_DEEP.clone().lerp(
              COLOR_BRIGHT,
              Math.min(1, h * 0.9 + Math.random() * 0.25),
            );
            colors[i * 3] = c.r;
            colors[i * 3 + 1] = c.g;
            colors[i * 3 + 2] = c.b;
          }
          geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
          geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

          const mat = new THREE.PointsMaterial({
            size: 0.045,
            map: dotTexture,
            vertexColors: true,
            transparent: true,
            opacity: 0.95,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
          });
          return new THREE.Points(geo, mat);
        }

        function placeSpikes(
          count,
          sphereRadius,
          length,
          baseRadius,
          particlesPerSpike,
        ) {
          const group = new THREE.Group();
          const dirs = fibonacciDirections(count);
          const up = new THREE.Vector3(0, 1, 0);

          dirs.forEach((dir) => {
            const spike = createSpike(length, baseRadius, particlesPerSpike);
            spike.position.copy(
              dir.clone().multiplyScalar(sphereRadius * 0.85),
            );
            spike.quaternion.setFromUnitVectors(up, dir);
            group.add(spike);
          });
          return group;
        }

        /* ============================================================
           7. 메인 구조 조립
           ============================================================ */
        const mandala = new THREE.Group();
        const CORE_RADIUS = 1.4;

        const core = createCoreSphere(CORE_RADIUS, 10000);
        mandala.add(core);

        const innerBumps = placeSpikes(20, CORE_RADIUS, 0.6, 0.8, 220);
        mandala.add(innerBumps);

        // const midSpikes = placeSpikes(8, CORE_RADIUS, 0.7, 0.55, 400);
        const midSpikes = placeSpikes(0, CORE_RADIUS * 0.9, 0.8, 1, 600);
        mandala.add(midSpikes);

        const largeSpikes = placeSpikes(18, CORE_RADIUS * 1.1, 0.7, 1, 600);
        mandala.add(largeSpikes);

        scene.add(mandala);

        const stars = createStarfield();
        scene.add(stars);

        /* ============================================================
           8. Post-processing (Bloom) — 보라색 글로우 효과
           ============================================================ */
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera));

        const bloom = new THREE.UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          3.5, // strength
          0.65, // radius
          0.04, // threshold
        );
        composer.addPass(bloom);

        /* ============================================================
           9. 상태 관리
           ============================================================ */
        let gomisState = "idle";

        const stateLabels = {
          idle: "대기 중",
          speaking: "응답 중",
          listening: "듣고 있습니다 . . .",
          thinking: "생각하는 중 . . .",
          locked: "🔒 잠금 모드",
        };

        window.setGomisState = function (newState) {
          if (gomisState === newState) return;
          gomisState = newState;
          const el = document.getElementById("status");
          el.style.opacity = "0";
          setTimeout(() => {
            el.textContent = stateLabels[newState] || newState;
            el.style.opacity = "1";
          }, 350);
        };

        /* ============================================================
           10. 애니메이션 루프
           ============================================================ */
        const clock = new THREE.Clock();

        // 보간용 현재값 (상태 전환 시 부드럽게 변화)
        let curRotSpeed = 0.0015;
        let curScale = 1.0;
        let curBloom = 1.45;

        function animate() {
          requestAnimationFrame(animate);
          const t = clock.getElapsedTime();

          // ── 목표 회전 속도 계산 ──
          let targetRotSpeed = 0.0015;
          if (gomisState === "locked") targetRotSpeed = 0.0003;
          else if (gomisState === "thinking") targetRotSpeed = 0.006;
          else if (gomisState === "speaking") targetRotSpeed = 0.004;
          else if (gomisState === "listening") targetRotSpeed = 0.0028;

          curRotSpeed += (targetRotSpeed - curRotSpeed) * 0.05;
          mandala.rotation.y += curRotSpeed;
          mandala.rotation.x = Math.sin(t * 0.15) * 0.15;

          // ── 목표 스케일 계산 (기존 sin 공식 유지) ──
          let targetScale = 1.0;
          if (gomisState === "locked") {
            targetScale += 0.015 * Math.sin(t * 0.25);
          } else if (gomisState === "idle") {
            targetScale += 0.04 * Math.sin(t * 0.5);
            targetScale += 0.02 * Math.sin(t * 0.3 + 1.0);
          } else if (gomisState === "speaking") {
            targetScale += 0.2 * Math.abs(Math.sin(t * 2.2));
            targetScale += 0.06 * Math.sin(t * 1.3 + 0.7);
            targetScale += 0.03 * Math.sin(t * 3.8 + 1.4);
          } else if (gomisState === "listening") {
            targetScale += 0.07 * Math.sin(t * 1.8);
            targetScale += 0.03 * Math.sin(t * 3.5 + 0.9);
          } else if (gomisState === "thinking") {
            targetScale += 0.03 * Math.sin(t * 5.0);
            targetScale += 0.02 * Math.sin(t * 8.1 + 1.0);
          }
          curScale += (Math.max(0.7, targetScale) - curScale) * 0.06;
          mandala.scale.setScalar(curScale);

          const spikeBoost = 1 + (curScale - 1) * 1.8;
          largeSpikes.scale.setScalar(Math.max(0.8, spikeBoost));
          midSpikes.scale.setScalar(Math.max(0.8, spikeBoost));

          // ── 목표 bloom 강도 계산 ──
          let targetBloom = 1.45 + Math.sin(t * 0.8) * 0.12;
          if (gomisState === "locked") {
            targetBloom = 0.9 + 0.08 * Math.sin(t * 0.3);
          } else if (gomisState === "speaking") {
            targetBloom = 1.9 + 0.4 * Math.abs(Math.sin(t * 2.5));
          } else if (gomisState === "listening") {
            targetBloom = 1.65 + 0.15 * Math.sin(t * 1.2);
          } else if (gomisState === "thinking") {
            targetBloom = 1.55 + 0.3 * Math.abs(Math.sin(t * 3.0));
          }
          curBloom += (targetBloom - curBloom) * 0.04;
          bloom.strength = curBloom;

          // 별 파티클 무중력 이동 — 범위 이탈 시 반대편에서 재출발
          const posAttr = stars.geometry.attributes.position;
          const vels = stars.userData.velocities;
          const starCount = posAttr.count;
          for (let i = 0; i < starCount; i++) {
            posAttr.array[i * 3] += vels[i * 3];
            posAttr.array[i * 3 + 1] += vels[i * 3 + 1];
            posAttr.array[i * 3 + 2] += vels[i * 3 + 2];
            const px = posAttr.array[i * 3];
            const py = posAttr.array[i * 3 + 1];
            const pz = posAttr.array[i * 3 + 2];
            if (
              px * px + py * py + pz * pz > 110 * 110 ||
              px * px + py * py + pz * pz < 50 * 50
            ) {
              randomStarPosition(posAttr.array, i);
              randomStarVelocity(vels, i);
            }
          }
          posAttr.needsUpdate = true;

          composer.render();
        }
        animate();

        /* ============================================================
           11. 리사이즈 대응
           ============================================================ */
        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
          composer.setSize(window.innerWidth, window.innerHeight);
        });
      }
    </script>
  </body>
</html>
