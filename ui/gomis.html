<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Gomis</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #ui {
        position: fixed;
        bottom: 8%;
        width: 100%;
        text-align: center;
        pointer-events: none;
        z-index: 10;
      }
      #status {
        font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        font-size: 14px;
        letter-spacing: 4px;
        color: rgba(205, 165, 255, 0.92);
        text-shadow: 0 0 22px rgba(170, 100, 255, 0.85);
      }
      #name {
        margin-top: 10px;
        font-family: 'Courier New', monospace;
        font-size: 10px;
        letter-spacing: 7px;
        color: rgba(130, 90, 195, 0.48);
      }
      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(180, 130, 255, 0.7);
        font-family: 'Courier New', monospace;
        font-size: 12px;
        letter-spacing: 3px;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="loading">GOMIS LOADING . . .</div>
    <div id="ui" style="display:none">
      <div id="status">대기 중</div>
      <div id="name">G · O · M · I · S</div>
    </div>

    <!-- Three.js r134 UMD (importmap 미지원 환경 대응) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/Pass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
      window.addEventListener('load', function () {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        initGomis();
      });

      function initGomis() {

        /* ============================================================
           1. 기본 Scene / Camera / Renderer 세팅
           ============================================================ */
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);

        const camera = new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.set(0, 0, 9);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.insertBefore(renderer.domElement, document.getElementById('ui'));

        /* ============================================================
           2. 파티클용 원형 텍스처 생성 (부드러운 점)
           ============================================================ */
        function makeCircleTexture() {
          const size = 128;
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = size;
          const ctx = canvas.getContext("2d");
          const grad = ctx.createRadialGradient(
            size / 2, size / 2, 0,
            size / 2, size / 2, size / 2,
          );
          grad.addColorStop(0.0, "rgba(255,255,255,1)");
          grad.addColorStop(0.3, "rgba(255,255,255,0.6)");
          grad.addColorStop(0.7, "rgba(255,255,255,0.1)");
          grad.addColorStop(1.0, "rgba(255,255,255,0)");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, size, size);
          return new THREE.CanvasTexture(canvas);
        }
        const dotTexture = makeCircleTexture();

        /* ============================================================
           3. 색상 팔레트 (보라/라벤더 톤)
           ============================================================ */
        const COLOR_BRIGHT = new THREE.Color(0xe9d5ff); // 밝은 라벤더
        const COLOR_MID    = new THREE.Color(0xa78bfa); // 메인 바이올렛
        const COLOR_DEEP   = new THREE.Color(0x6d28d9); // 짙은 퍼플

        /* ============================================================
           4. 별 배경 (Starfield)
           ============================================================ */
        function createStarfield() {
          const count = 4500;
          const geo = new THREE.BufferGeometry();
          const positions = new Float32Array(count * 3);

          for (let i = 0; i < count; i++) {
            const r     = 60 + Math.random() * 40;
            const theta = Math.random() * Math.PI * 2;
            const phi   = Math.acos(2 * Math.random() - 1);
            positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);
          }
          geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

          const mat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.18,
            map: dotTexture,
            transparent: true,
            opacity: 0.85,
            depthWrite: false,
            sizeAttenuation: true,
            blending: THREE.AdditiveBlending,
          });
          return new THREE.Points(geo, mat);
        }

        /* ============================================================
           5. 중심 코어 — 빛나는 입자 구체
           ============================================================ */
        function createCoreSphere(radius, count) {
          const geo       = new THREE.BufferGeometry();
          const positions = new Float32Array(count * 3);
          const colors    = new Float32Array(count * 3);

          for (let i = 0; i < count; i++) {
            const r     = radius + (Math.random() - 0.5) * 0.18;
            const theta = Math.random() * Math.PI * 2;
            const phi   = Math.acos(2 * Math.random() - 1);

            positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);

            const t = Math.random();
            const c = COLOR_MID.clone().lerp(COLOR_BRIGHT, t * 0.7);
            colors[i * 3]     = c.r;
            colors[i * 3 + 1] = c.g;
            colors[i * 3 + 2] = c.b;
          }
          geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
          geo.setAttribute("color",    new THREE.BufferAttribute(colors, 3));

          const mat = new THREE.PointsMaterial({
            size: 0.055,
            map: dotTexture,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
          });
          return new THREE.Points(geo, mat);
        }

        /* ============================================================
           6. 스파이크(원뿔) — 파티클로 표현
           ============================================================ */
        function fibonacciDirections(count) {
          const dirs   = [];
          const golden = Math.PI * (3 - Math.sqrt(5));
          for (let i = 0; i < count; i++) {
            const y     = 1 - (i / (count - 1)) * 2;
            const r     = Math.sqrt(1 - y * y);
            const theta = golden * i;
            dirs.push(new THREE.Vector3(Math.cos(theta) * r, y, Math.sin(theta) * r));
          }
          return dirs;
        }

        function createSpike(length, baseRadius, particleCount) {
          const geo       = new THREE.BufferGeometry();
          const positions = new Float32Array(particleCount * 3);
          const colors    = new Float32Array(particleCount * 3);

          for (let i = 0; i < particleCount; i++) {
            const h          = Math.sqrt(Math.random());
            const angle      = Math.random() * Math.PI * 2;
            const radiusAtH  = baseRadius * (1 - h);
            const surfaceMix = Math.random() < 0.7 ? 1.0 : Math.random();

            positions[i * 3]     = Math.cos(angle) * radiusAtH * surfaceMix;
            positions[i * 3 + 1] = h * length;
            positions[i * 3 + 2] = Math.sin(angle) * radiusAtH * surfaceMix;

            const c = COLOR_DEEP.clone().lerp(
              COLOR_BRIGHT,
              Math.min(1, h * 0.9 + Math.random() * 0.25),
            );
            colors[i * 3]     = c.r;
            colors[i * 3 + 1] = c.g;
            colors[i * 3 + 2] = c.b;
          }
          geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
          geo.setAttribute("color",    new THREE.BufferAttribute(colors, 3));

          const mat = new THREE.PointsMaterial({
            size: 0.045,
            map: dotTexture,
            vertexColors: true,
            transparent: true,
            opacity: 0.95,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true,
          });
          return new THREE.Points(geo, mat);
        }

        function placeSpikes(count, sphereRadius, length, baseRadius, particlesPerSpike) {
          const group = new THREE.Group();
          const dirs  = fibonacciDirections(count);
          const up    = new THREE.Vector3(0, 1, 0);

          dirs.forEach((dir) => {
            const spike = createSpike(length, baseRadius, particlesPerSpike);
            spike.position.copy(dir.clone().multiplyScalar(sphereRadius));
            spike.quaternion.setFromUnitVectors(up, dir);
            group.add(spike);
          });
          return group;
        }

        /* ============================================================
           7. 메인 구조 조립
           ============================================================ */
        const mandala     = new THREE.Group();
        const CORE_RADIUS = 1.4;

        const core        = createCoreSphere(CORE_RADIUS, 12000);
        mandala.add(core);

        const innerBumps  = placeSpikes(60, CORE_RADIUS, 0.28, 0.2,  220);
        mandala.add(innerBumps);

        const midSpikes   = placeSpikes(28, CORE_RADIUS, 0.95, 0.22, 400);
        mandala.add(midSpikes);

        const largeSpikes = placeSpikes(15, CORE_RADIUS, 2.1,  0.42, 700);
        mandala.add(largeSpikes);

        scene.add(mandala);

        const stars = createStarfield();
        scene.add(stars);

        /* ============================================================
           8. Post-processing (Bloom) — 보라색 글로우 효과
           ============================================================ */
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera));

        const bloom = new THREE.UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          1.5,  // strength
          0.65, // radius
          0.04, // threshold
        );
        composer.addPass(bloom);

        /* ============================================================
           9. 상태 관리
           ============================================================ */
        let gomisState = 'idle';

        const stateLabels = {
          idle:      '대기 중',
          speaking:  '응답 중',
          listening: '듣고 있습니다 . . .',
          thinking:  '생각하는 중 . . .',
        };

        window.setGomisState = function (newState) {
          gomisState = newState;
          document.getElementById('status').textContent = stateLabels[newState] || newState;
        };

        /* ============================================================
           10. 애니메이션 루프
           ============================================================ */
        const clock = new THREE.Clock();

        function animate() {
          requestAnimationFrame(animate);
          const t  = clock.getElapsedTime();
          const dt = Math.min(clock.getDelta(), 0.05);

          // 상태별 회전 속도
          let rotSpeed = 0.0015;
          if      (gomisState === 'thinking')  rotSpeed = 0.006;
          else if (gomisState === 'speaking')  rotSpeed = 0.004;
          else if (gomisState === 'listening') rotSpeed = 0.0028;

          mandala.rotation.y += rotSpeed;
          mandala.rotation.x  = Math.sin(t * 0.15) * 0.15;

          // 상태별 호흡 스케일
          let s = 1.0;
          if (gomisState === 'idle') {
            s += 0.04 * Math.sin(t * 0.5);
            s += 0.02 * Math.sin(t * 0.3 + 1.0);
          } else if (gomisState === 'speaking') {
            s += 0.10 * Math.abs(Math.sin(t * 2.2));
            s += 0.06 * Math.sin(t * 1.3 + 0.7);
            s += 0.03 * Math.sin(t * 3.8 + 1.4);
          } else if (gomisState === 'listening') {
            s += 0.07 * Math.sin(t * 1.8);
            s += 0.03 * Math.sin(t * 3.5 + 0.9);
          } else if (gomisState === 'thinking') {
            s += 0.03 * Math.sin(t * 5.0);
            s += 0.02 * Math.sin(t * 8.1 + 1.0);
          }
          mandala.scale.setScalar(Math.max(0.7, s));

          // 상태별 bloom 강도
          if (gomisState === 'speaking') {
            bloom.strength = 1.9 + 0.4 * Math.abs(Math.sin(t * 2.5));
          } else if (gomisState === 'listening') {
            bloom.strength = 1.65 + 0.15 * Math.sin(t * 1.2);
          } else if (gomisState === 'thinking') {
            bloom.strength = 1.55 + 0.3 * Math.abs(Math.sin(t * 3.0));
          } else {
            bloom.strength = 1.45 + Math.sin(t * 0.8) * 0.12;
          }

          // 별 배경 아주 천천히 회전
          stars.rotation.y = t * 0.008;

          composer.render();
        }
        animate();

        /* ============================================================
           11. 리사이즈 대응
           ============================================================ */
        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
          composer.setSize(window.innerWidth, window.innerHeight);
        });
      }
    </script>
  </body>
</html>
